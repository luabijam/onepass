name: Build macOS App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/desktop

      - name: Install dependencies
        run: pnpm install

      - name: Build vault-core
        run: pnpm run build:release

      - name: Fix symlinks and Install CocoaPods dependencies
        working-directory: packages/desktop/macos
        run: |
          # Remove all symlinks in node_modules and copy actual content
          # This fixes the CocoaPods "pathname contains null byte" issue with pnpm
          cd ../../..
          find node_modules -type l -print0 | while IFS= read -r -d '' link; do
            if [ -L "$link" ]; then
              target=$(readlink "$link")
              if [ -e "$target" ]; then
                rm -f "$link"
                cp -r "$target" "$link"
              fi
            fi
          done || true
          # Re-run pnpm to fix any broken module resolutions
          pnpm install --offline
          cd packages/desktop/macos
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Build macOS app
        run: pnpm run build:macos:release

      - name: Create DMG (optional)
        run: |
          APP_PATH="packages/desktop/macos/build/Build/Products/Release/OnePass.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p dist
            hdiutil create -volname "OnePass" \
              -srcfolder "$APP_PATH" \
              -ov -format UDZO \
              dist/OnePass-macOS.dmg
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: onepass-macos-app
          path: packages/desktop/macos/build/Build/Products/Release/OnePass.app
          retention-days: 30

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: onepass-macos-dmg
          path: dist/OnePass-macOS.dmg
          retention-days: 30
