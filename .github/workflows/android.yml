name: Build Android APK

on:
  # push:
  #   branches: [main, master]
  #   tags: ['v*']
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch: # Only trigger manually

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build vault-core
        run: pnpm run build:release

      - name: Generate debug keystore
        working-directory: packages/mobile/android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Android APK
        working-directory: packages/mobile
        run: cd android && ./gradlew assembleRelease
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: packages/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: packages/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
